name: Daily information update
run-name: Daily information update (${{ inputs.trigger_reason || 'manual' }})

on:
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: Trigger source for scheduled update tracking
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-information-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests before update
        run: npm test

      - name: Fetch, process, audit, and archive feeds
        run: npm run update:daily

      - name: Commit changed data
        run: |
          git add data/raw/rss-items.json \
            data/normalized/normalized-items.json \
            data/processed/filtered-items.json \
            data/processed/deduped-items.json \
            data/processed/scored-items.json \
            data/processed/article-enrichment.json \
            data/processed/source-audit.json \
            data/archive/daily \
            src/data/latest-items.json \
            src/data/source-health.json
          if git diff --cached --quiet; then
            echo "No data changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update daily information data"
          git push
