name: Daily summary update
run-name: Daily summary update (${{ inputs.trigger_reason || 'manual' }})

on:
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: Trigger source for scheduled summary update tracking
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-summary-update
  cancel-in-progress: false

jobs:
  update-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_API_KEY1: ${{ secrets.DEEPSEEK_API_KEY1 }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests before summary update
        run: npm test

      - name: Generate daily summary and refresh archive
        run: npm run update:summary

      - name: Commit changed summary data
        run: |
          git add data/processed/ai-summaries.json \
            data/archive/daily \
            src/data/daily-summary.json \
            src/data/history-index.json \
            src/data/latest-items.json \
            index.html
          if git diff --cached --quiet; then
            echo "No summary changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update daily summary data"
          git push
